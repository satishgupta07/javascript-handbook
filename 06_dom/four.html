<!DOCTYPE html>
<!--
  CONCEPT: DOM Manipulation — Edit and Remove Elements
  ============================================================
  After selecting an element you can edit or remove it.

  EDITING:
    element.innerHTML = '<li>New</li>'    → replaces inner HTML (parses tags)
    element.textContent = 'text'         → replaces with plain text (safer)
    element.replaceWith(newElement)      → replaces element with another node
    element.outerHTML = '<li>New</li>'   → replaces the element itself
                                           (element reference becomes stale!)

  REMOVING:
    element.remove()                     → removes element from the DOM

  CSS SELECTORS in querySelector:
    'li:nth-child(2)'   → second li
    'li:first-child'    → first li
    'li:last-child'     → last li
  ============================================================
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chai aur code | DOM</title>
</head>
<body style="background-color: #212121; color: #fff;">
    <ul class="language">
        <li>Javascript</li>
    </ul>
</body>
<script>
    // --- ADDING elements ---

    // innerHTML approach — parses the string as HTML (simple but XSS risk)
    function addLanguage(langName){
        const li = document.createElement('li');
        li.innerHTML = `${langName}`
        document.querySelector('.language').appendChild(li)
    }
    addLanguage("python")
    addLanguage("typescript")

    // Optimised approach — createTextNode is safer (no HTML parsing)
    function addOptiLanguage(langName){
        const li = document.createElement('li');
        li.appendChild(document.createTextNode(langName))
        document.querySelector('.language').appendChild(li)
    }
    addOptiLanguage('golang')

    // List is now: Javascript, python, typescript, golang

    // --- EDITING elements ---

    // replaceWith(newNode) — swaps the selected element with a new one
    const secondLang = document.querySelector("li:nth-child(2)")  // "python"
    console.log(secondLang);
    //secondLang.innerHTML = "Mojo"   // simple innerHTML edit
    const newli = document.createElement('li')
    newli.textContent = "Mojo"
    secondLang.replaceWith(newli)    // "python" → "Mojo"

    // outerHTML — replaces the element AND its tag with a raw HTML string
    // WARNING: the original variable (firstLang) now points to a detached node
    const firstLang = document.querySelector("li:first-child")  // "Javascript"
    firstLang.outerHTML = '<li>TypeScript</li>'  // "Javascript" → "TypeScript"

    // --- REMOVING elements ---

    // remove() — removes the element from the DOM entirely
    const lastLang = document.querySelector('li:last-child')  // "golang"
    lastLang.remove()    // "golang" is gone
</script>
</html>
