<!DOCTYPE html>
<!--
  CONCEPT: DOM Traversal — Navigating Parent / Child / Sibling nodes
  ============================================================
  Once you have a reference to one element, you can navigate
  the DOM tree relative to it without using another querySelector.

  CHILD NAVIGATION:
    element.children            → HTMLCollection of direct child ELEMENTS
    element.childNodes          → NodeList of ALL child nodes
                                  (includes text nodes, comments, elements)
    element.firstElementChild   → first child element
    element.lastElementChild    → last child element

  PARENT NAVIGATION:
    element.parentElement       → direct parent element
    element.parentNode          → direct parent node (usually same as above)

  SIBLING NAVIGATION:
    element.nextElementSibling     → next sibling element
    element.previousElementSibling → previous sibling element

  KEY DIFFERENCE — children vs childNodes:
    children    → only element nodes (what you usually want)
    childNodes  → everything: text nodes (whitespace!), comments, elements
  ============================================================
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM | Chai aur code</title>
</head>
<body style="background-color: #212121; color: #fff;">
    <div class="parent">
        <!-- this is a comment -->
        <div class="day">Monday</div>
        <div class="day">Tuesday</div>
        <div class="day">Wednesday</div>
        <div class="day">Thursday</div>
    </div>
</body>
<script>
    const parent = document.querySelector('.parent')
    // console.log(parent);
    // console.log(parent.children);              // HTMLCollection of 4 .day divs
    // console.log(parent.children[1].innerHTML); // "Tuesday"

    // Looping over children
    // for (let i = 0; i < parent.children.length; i++) {
    //      console.log(parent.children[i].innerHTML);
    // }

    // Directly styling a child by index
    parent.children[1].style.color = "orange"   // Tuesday turns orange

    // console.log(parent.firstElementChild);    // Monday div
    // console.log(parent.lastElementChild);     // Thursday div

    // Sibling navigation starting from first .day
    const dayOne = document.querySelector('.day')
    // console.log(dayOne);                      // Monday div
    // console.log(dayOne.parentElement);        // .parent div
    // console.log(dayOne.nextElementSibling);   // Tuesday div

    // childNodes includes the comment node and whitespace text nodes too
    console.log("NODES: ", parent.childNodes);
</script>
</html>
