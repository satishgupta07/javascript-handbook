<!DOCTYPE html>
<!--
  CONCEPT: setTimeout & clearTimeout
  ============================================================
  setTimeout schedules a function to run ONCE after a delay.

  SYNTAX:
    const timerId = setTimeout(fn, delayMs)
    clearTimeout(timerId)   ← cancels it before it fires

  HOW IT WORKS:
    setTimeout is a Web API — it doesn't block the main thread.
    The callback goes to the Callback Queue after delayMs ms,
    then the Event Loop moves it to the Call Stack when it's free.

  clearTimeout:
    If you save the return value of setTimeout (the timer ID),
    you can cancel it at any time before it fires with clearTimeout.
    After clearTimeout, the callback will NEVER run.

  USE CASE HERE:
    Text changes after 2 seconds, but clicking "Stop" before
    that cancels the timeout so the text never changes.
  ============================================================
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>setTimeout & clearTimeout</title>
</head>
<body>
    <h1>Chai aur code</h1>
    <button id="stop">Stop</button>
</body>
<script>
    const sayHitesh = function(){
        console.log("Hitesh");
    }

    // Changes the h1 text after 2000ms (2 seconds)
    const changeText = function(){
        document.querySelector('h1').innerHTML = "best JS series"
    }

    // setTimeout returns a numeric timer ID — save it to cancel later
    const changeMe = setTimeout(changeText, 2000)

    // Click "Stop" before 2 seconds to cancel the timeout
    document.querySelector('#stop').addEventListener('click', function(){
        clearTimeout(changeMe)   // cancels the scheduled changeText call
        console.log("STOPPED")
    })
</script>
</html>
